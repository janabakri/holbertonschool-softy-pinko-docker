services: 
  back-end: 
    build: 
      context: ./back-end 
      dockerfile: Dockerfile 
    networks: 
      - app-network 
  front-end: 
    build: 
      context: ./front-end 
      dockerfile: Dockerfile 
    depends_on: 
      - back-end 
    networks: 
      - app-network 
  proxy: 
    build: 
      context: ./proxy 
      dockerfile: Dockerfile 
    ports: 
      - "80:80" 
    depends_on: 
      - front-end 
      - back-end 
    networks: 
      - app-network 
networks: 
  app-network: 
    driver: bridge 
